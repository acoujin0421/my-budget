<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>예산 관리</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <!-- 왼쪽 사이드바: 예산 현황 네비게이션 -->
      <aside class="sidebar left" id="leftSidebar">
        <div class="sidebar-header">
          <h2>예산 현황</h2>
          <button type="button" id="addBudgetBtn" class="btn-add" title="예산 추가">+ 예산</button>
        </div>
        <nav id="budgetNav" class="budget-nav" aria-label="예산 목록"></nav>
      </aside>
      <div class="resize-handle" id="resizeLeft" title="드래그하여 너비 조절"></div>

      <!-- 가운데: 대시보드 -->
      <main class="dashboard">
        <div id="dashboardEmpty" class="empty-state">
          <p>왼쪽에서 예산을 선택하세요.</p>
        </div>
        <div id="dashboardContent" class="dashboard-content" hidden>
          <header class="dashboard-header">
            <h1 id="selectedBudgetTitle"></h1>
            <div class="budget-summary">
              <div class="summary-item">
                <span class="label">기정 예산</span>
                <span id="totalBudget" class="value">₩0</span>
              </div>
              <div class="summary-item">
                <span class="label">총 지출</span>
                <span id="totalSpent" class="value spent">₩0</span>
              </div>
              <div class="summary-item highlight">
                <span class="label">예산 잔액</span>
                <span id="balance" class="value">₩0</span>
              </div>
            </div>
            <div class="dashboard-actions">
              <button type="button" id="editBudgetBtn" class="btn-secondary">예산 수정</button>
              <button type="button" id="deleteBudgetBtn" class="btn-danger">예산 삭제</button>
            </div>
          </header>
          <section class="expense-logs">
            <h3>지출 내역</h3>
            <div id="expenseLogTable" class="expense-table-wrap">
              <table class="expense-table">
                <thead>
                  <tr>
                    <th>품의일</th>
                    <th>지출일</th>
                    <th>구입 상세</th>
                    <th>단가</th>
                    <th>수</th>
                    <th>금액</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="expenseLogBody"></tbody>
              </table>
            </div>
            <p id="noExpenses" class="hint" hidden>등록된 지출이 없습니다.</p>
          </section>
        </div>
      </main>
      <div class="resize-handle" id="resizeRight" title="드래그하여 너비 조절"></div>

      <!-- 오른쪽 사이드바: 지출 입력 -->
      <aside class="sidebar right" id="rightSidebar">
        <div class="sidebar-header">
          <h2>지출 입력</h2>
        </div>
        <form id="expenseForm" class="expense-form">
          <label>
            <span>예산 선택</span>
            <select id="expenseBudgetSelect" required></select>
          </label>
          <label>
            <span>품의 날짜</span>
            <input type="date" id="expenseSubmissionDate" required />
          </label>
          <label>
            <span>지출 날짜</span>
            <input type="date" id="expenseDate" required />
          </label>
          <label>
            <span>구입 상세 내역</span>
            <input type="text" id="expenseDetails" placeholder="예: 악보지 500매" required />
          </label>
          <label>
            <span>단가 (원)</span>
            <input type="number" id="expenseUnitPrice" min="0" placeholder="0" />
          </label>
          <label>
            <span>수</span>
            <input type="number" id="expenseQuantity" min="1" value="1" placeholder="1" />
          </label>
          <label>
            <span>금액 (원)</span>
            <input type="number" id="expenseAmount" min="0" placeholder="0" required />
          </label>
          <p class="hint">단가×수를 입력하면 금액이 자동 계산됩니다.</p>
          <div class="form-actions">
            <button type="submit" class="btn-primary">지출 등록</button>
            <button type="button" id="cancelExpenseEdit" class="btn-secondary" hidden>취소</button>
          </div>
          <p id="saveStatus" class="status" aria-live="polite"></p>
        </form>
      </aside>
    </div>

    <!-- 예산 추가/수정 모달 -->
    <dialog id="budgetModal">
      <form id="budgetForm" class="modal-form">
        <h3 id="budgetModalTitle">예산 추가</h3>
        <label>
          <span>세부사업</span>
          <input type="text" id="budget세부사업" required />
        </label>
        <label>
          <span>세부항목</span>
          <input type="text" id="budget세부항목" required />
        </label>
        <label>
          <span>원가통계비목</span>
          <input type="text" id="budget원가통계비목" required />
        </label>
        <label>
          <span>산출내역</span>
          <input type="text" id="budget산출내역" required />
        </label>
        <label>
          <span>기정 예산 (원)</span>
          <input type="number" id="budget기정예산" min="0" required />
        </label>
        <div class="modal-actions">
          <button type="button" id="closeBudgetModal" class="btn-secondary">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
